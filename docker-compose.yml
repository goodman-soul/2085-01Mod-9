services:
  jinxiaocun-backend:
    build: .
    container_name: jinxiaocun-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DB_PATH: /app/data/app.db
      USER_DATA_KEY_FILE: /app/data/user_key.b64
      SESSION_TTL_HOURS: 12
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
